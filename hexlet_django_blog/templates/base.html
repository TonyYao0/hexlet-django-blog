<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}Django на Хекслете{% endblock %}</title>
</head>
<body>
<div id="sidebar">
    {% block sidebar %}
        <ul>
            <li><a href="{% url 'index' %}">Главная</a></li>
            <li><a href="{% url 'article_list' %}">Статьи</a></li>
            <li><a href= "{% url 'articles_create' %}" style="font-weight: bold;">+ Создать статью</a></li>
        </ul>
    {% endblock %}
</div>
<div id="content">
    {% if messages %}
            <div class="messages">
            {% for message in messages %}
                <div style="padding: 10px; margin-bottom: 15px; border: 1px solid gray;">
                    {{ message }}
                </div>
            {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
